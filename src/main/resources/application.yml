server:
  port: 8080

netty:
  server:
    port: 9000
    boss-threads: 1
    worker-threads: 0
    business-threads: 64
    idle-timeout-seconds: 5
    max-idle-count: 3
    max-frame-length: 10485760  # 10MB
    so-backlog: 1024
    tls-enabled: false
    tls-port: 9001
    tls-cert-path: ""
    tls-cert-password: ""
    auth-timeout-seconds: 10
    # Kafka 消息持久化配置
    kafka-enabled: false
    kafka-topic: device-messages
    # 限流配置
    rate-limit-enabled: true
    rate-limit-global-permits: 10000   # 全局每秒令牌数
    rate-limit-device-permits: 100     # 单设备每秒令牌数
    rate-limit-close-on-limit: false   # 限流后是否关闭连接
    # WebSocket 配置
    websocket-enabled: true
    websocket-path: /ws
    websocket-max-frame-size: 65536
    # V4 新增配置
    ack-timeout-ms: 30000               # ACK 确认超时（毫秒）
    backpressure-enabled: true          # TCP 背压流控
    backpressure-high-water-mark: 65536 # 背压高水位
    backpressure-low-water-mark: 32768  # 背压低水位
    ip-filter-enabled: true             # IP 动态黑名单
    ip-filter-ban-threshold: 5          # 封禁阈值次数
    ip-filter-ban-window-seconds: 60    # 统计窗口
    ip-filter-ban-duration-minutes: 30  # 封禁时长
    cluster-enabled: false              # 集群模式（默认关闭）
    cluster-node-id: ""                 # 集群节点ID
    cluster-session-ttl-seconds: 3600   # 集群会话TTL
    thing-model-enabled: false          # 物模型开关

spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: your_strong_password
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  # Kafka 配置
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 5
      enable-idempotence: true

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: always
